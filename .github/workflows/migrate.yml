name: Run Django migrations on push

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (uses DATABASE_URL secret)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          echo "DATABASE_URL=${DATABASE_URL/:*/:****@}"
          python manage.py migrate --noinput
          if [ -f data.json ]; then
            echo 'data.json exists — loading'
            python manage.py loaddata data.json || true
          else
            echo 'no data.json found — skipping'
          fi
      - name: Trigger Render deploy (optional)
        if: ${{ secrets.RENDER_SERVICE_ID && secrets.RENDER_API_KEY }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo 'Triggering Render deploy for service:' $RENDER_SERVICE_ID
          curl -s -X POST "https://api.render.com/deploys?serviceId=${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}'
