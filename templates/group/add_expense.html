{% extends "base.html" %}
{% block title %}Add Expense • {{ group.name }}{% endblock %}

{% block content %}
<div style="padding:2rem 1rem;max-width:600px;margin:0 auto;">
  <div style="background:#fff;border:1px solid #eef2f7;border-radius:18px;padding:1.5rem;box-shadow:0 10px 30px rgba(0,0,0,0.06);">
    <h2 style="margin:0 0 6px 0;">Add Expense</h2>
    <div style="color:#64748b;margin-bottom:14px;">Group: <b>{{ group.name }}</b></div>

    {% if error %}
      <div style="background:#fff1f2;border:1px solid #fecaca;color:#b91c1c;padding:10px 12px;border-radius:12px;margin-bottom:12px;">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <label style="display:block;font-weight:700;margin-bottom:6px;">Reason / Description</label>
      <input type="text" name="description" required
             style="width:100%;padding:10px 12px;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:12px;">

      <label style="display:block;font-weight:700;margin-bottom:6px;">Amount</label>
      <input type="number" name="amount" step="0.01" required
             style="width:100%;padding:10px 12px;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:12px;">

      <label style="display:block;font-weight:700;margin-bottom:6px;">Receipt (optional)</label>
      <input type="file" name="receipt" accept="image/*" style="width:100%;margin-bottom:16px;">

      <button type="submit"
              style="width:100%;padding:12px 14px;border:none;border-radius:14px;background:#22c55e;color:white;font-weight:800;cursor:pointer;">
        Save Expense
      </button>
    </form>

    <div style="margin-top:12px;">
      <a href="{% url 'groupdetail' groupid=group.id %}" style="text-decoration:none;color:#4f46e5;font-weight:700;">
        Back to group
      </a>
    </div>
  </div>
</div>
{% endblock %}
