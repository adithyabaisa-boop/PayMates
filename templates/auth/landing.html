{% extends "base.html" %}

{% block content %}
<div style="
    display:flex;
    justify-content:center;
    align-items:center;
    min-height: calc(100vh - 2rem);
">
    <div style="
        max-width: 420px;
        width: 100%;
        background-color: #ffffff;
        border-radius: 20px;
        padding: 2rem 1.75rem 1.5rem;
        box-shadow: 0 18px 35px rgba(15, 23, 42, 0.12);
        text-align: center;
    ">
        <div style="margin-bottom: 2.5rem;">
            <div style="
                width: 96px;
                height: 96px;
                margin: 0 auto 1rem;
                border-radius: 24px;
                background: linear-gradient(135deg, #16a34a, #0ea5e9);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
                font-size: 2.5rem;
                font-weight: 800;">
                P
            </div>
            <h1 style="margin:0; font-size:1.75rem;">PayMates</h1>
        </div>

        <div style="display:flex; flex-direction:column; gap:0.75rem;">
            <a href="{% url 'signup' %}"
               style="display:block;width:100%;padding:0.7rem;border-radius:999px;background:#16a34a;color:#fff;text-decoration:none;font-weight:500;">
                Sign up
            </a>
            <a href="{% url 'login' %}"
               style="display:block;width:100%;padding:0.7rem;border-radius:999px;background:#e5e7eb;color:#111827;text-decoration:none;font-weight:500;">
                Log in
            </a>
        </div>
    </div>
</div>
{% endblock %}
