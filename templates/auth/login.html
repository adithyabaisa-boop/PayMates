{% extends "base.html" %}

{% block content %}
<div style="
    max-width: 420px;
    margin: 3rem auto;
    background-color: #ffffff;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 10px 20px rgba(15,23,42,0.08);
">
    <button type="button"
            onclick="history.back()"
            style="margin-bottom: 0.75rem; border-radius: 999px; padding: 0.4rem 0.9rem; border: 1px solid #d1d5db; background:#e5e7eb; cursor:pointer;">
        ← Back
    </button>

    <div style="text-align:center; margin-bottom: 1rem; padding:0.75rem; background:#ecfdf5; border-radius:10px;">
        <h1 style="margin:0;">Log in</h1>
    </div>

    {% if error %}
        <p style="color:red; margin-bottom:0.5rem;">{{ error }}</p>
    {% endif %}

    <form method="post" style="display:flex; flex-direction:column; gap:0.75rem;">
        {% csrf_token %}

        <div style="display:flex; flex-direction:column; gap:0.25rem;">
            <label for="id_email">Username</label>
            <input type="text" id="id_email" name="email"
                   style="padding:0.5rem; border-radius:8px; border:1px solid #d1d5db;" required>
        </div>

        <div style="display:flex; flex-direction:column; gap:0.25rem;">
            <label for="id_password">Password</label>
            <input type="password" id="id_password" name="password"
                   style="padding:0.5rem; border-radius:8px; border:1px solid #d1d5db;" required>
        </div>

        <button type="submit"
                style="margin-top:0.5rem; padding:0.6rem; border-radius:999px; border:none; background:#16a34a; color:#ffffff; font-size:0.95rem; cursor:pointer;">
            Log in
        </button>
    </form>

    <p style="margin-top: 1rem; text-align: center; opacity: 0.6;">
        Forgot your password? (coming soon)
    </p>
</div>
{% endblock %}
